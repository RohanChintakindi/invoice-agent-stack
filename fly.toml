# fly.toml app configuration file generated for invoice-agent-stack-rohan on 2026-05-07T16:09:42-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'invoice-agent-stack-rohan'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DB_URL = 'sqlite:////data/invoice_stack.db'
  PORT = '8000'

[[mounts]]
  source = 'iridium_data'
  destination = '/data'
  initial_size = '1gb'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
